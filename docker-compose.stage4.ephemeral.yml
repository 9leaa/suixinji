services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: suixinji
      POSTGRES_USER: suixinji
      POSTGRES_PASSWORD: suixinji
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suixinji -d suixinji"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  migrate:
    build: .
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://suixinji:suixinji@postgres:5432/suixinji
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
