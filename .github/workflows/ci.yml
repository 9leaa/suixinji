name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: python -m pytest tests --cov=. --cov-report=term-missing --cov-fail-under=63

      - name: Evaluation dry-run
        run: |
          python eval/eval_classification.py --dry-run
          python eval/eval_retrieval.py --dry-run
          python eval/eval_summary.py --dry-run
          python eval/eval_query_react.py --dry-run
