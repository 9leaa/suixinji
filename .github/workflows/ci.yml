name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql+psycopg://suixinji:suixinji@localhost:5432/suixinji
      REDIS_URL: redis://localhost:6379/0
      STORAGE_BACKEND: local
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: suixinji
          POSTGRES_USER: suixinji
          POSTGRES_PASSWORD: suixinji
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suixinji -d suixinji"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: PostgreSQL schema
        run: alembic upgrade head

      - name: Pytest
        run: python -m pytest tests --cov=. --cov-report=term-missing --cov-fail-under=63

      - name: Evaluation dry-run
        run: |
          python eval/eval_classification.py --dry-run
          python eval/eval_retrieval.py --dry-run
          python eval/eval_summary.py --dry-run
          python eval/eval_query_react.py --dry-run
          python eval/eval_memory.py --dry-run
