services:
  suixinji:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["local-infra"]
    environment:
      POSTGRES_DB: suixinji
      POSTGRES_USER: suixinji
      POSTGRES_PASSWORD: suixinji
    ports:
      - "5432:5432"
    volumes:
      - suixinji-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suixinji -d suixinji"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  suixinji-postgres:
