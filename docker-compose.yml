services:
  suixinji:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["local-infra"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suixinji}
      POSTGRES_USER: ${POSTGRES_USER:-suixinji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - suixinji-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suixinji -d suixinji"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["local-infra"]
    command: ["redis-server", "--appendonly", "no", "--save", "", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  receiver:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "bot.feishu_bot"]
    restart: unless-stopped

  outbox-relay:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.outbox_relay"]
    restart: unless-stopped

  worker-ingest:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.worker", "ingest"]
    restart: unless-stopped

  worker-query:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.worker", "query"]
    restart: unless-stopped

  worker-summary:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.worker", "summary"]
    restart: unless-stopped

  worker-memory:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.worker", "memory"]
    restart: unless-stopped

  worker-delivery:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.worker", "delivery"]
    restart: unless-stopped

  scheduler:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["python", "-m", "apps.scheduler"]
    restart: unless-stopped

  api:
    build: .
    profiles: ["distributed"]
    env_file: [.env]
    command: ["uvicorn", "apps.api:app", "--host", "127.0.0.1", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  suixinji-postgres:
